<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Alpha</title>
</head>
<body>
    <button id="loginBtn">Login with Google</button>
    <button id="logoutBtn" style="display:none;">Logout</button>

    <div id="userInfo"></div>
    <header class="site-header">
        <h1 class="title">Project Alpha</h1>
        <p class="caption">This portfolio showcases my education, skills, and projects as I progress through my degree. I am particularly interested in software design, AI, and cybersecurity.</p>
    </header>
    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const firebaseConfig = {
    apiKey: "AIzaSyAptzbdXfqsd3c8f-JRNyycMfkG9UPe5L8",
    authDomain: "project-alpha-auth.firebaseapp.com",
    projectId: "project-alpha-auth",
    storageBucket: "project-alpha-auth.firebasestorage.app",
    messagingSenderId: "750532416813",
    appId: "1:750532416813:web:bbd087cbc26103bfc32fa4",
    measurementId: "G-32PN22XT4S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const provider = new GoogleAuthProvider();

    document.getElementById("loginBtn").onclick = async () => {
    await signInWithPopup(auth, provider);
    };

    document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("userInfo").innerHTML =
        `Logged in as ${user.displayName}`;

        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "inline";
    } else {
        document.getElementById("userInfo").innerHTML = "";

        document.getElementById("loginBtn").style.display = "inline";
        document.getElementById("logoutBtn").style.display = "none";
    }
    });
</script>
</body>
</html>
